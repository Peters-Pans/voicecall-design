# coturn 配置模板 — WebRTC 穿越云主机 NAT 必需
# 启动：turnserver -c /etc/turnserver.conf
# Ubuntu: apt install coturn && systemctl enable --now coturn
#
# 使用前把 YOUR_DOMAIN / YOUR_PUBLIC_IP / STRONG_SECRET / REALM 替换掉。
# 客户端传给 RTCPeerConnection 的 iceServers:
#   {urls: "stun:YOUR_DOMAIN:3478"}
#   {urls: "turn:YOUR_DOMAIN:3478?transport=udp", username, credential}

# 监听
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# 对外公告的公网 IP（必须正确，否则 ICE 失败）
external-ip=YOUR_PUBLIC_IP

# 分配给客户端的中继端口范围（防火墙要放开 UDP）
min-port=49152
max-port=65535

# 认证：REST API 模式（生产推荐）。
# 后端 GET /api/turn-credential 用同一个 secret HMAC-SHA1 签发时间受限凭证；
# 把 STRONG_SECRET 同步到后端 settings.TURN_PASSWORD（变量名保留，作为 shared secret）。
#
# 如只想做最简单的静态凭证（几个人用），改为下面这行并注释掉 use-auth-secret/static-auth-secret 两行：
#   user=voicecall:STRONG_SECRET
use-auth-secret
static-auth-secret=STRONG_SECRET

realm=YOUR_DOMAIN

# TLS（如走 turns://）
# cert=/etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
# pkey=/etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem

# 安全：禁止中继到内网/回环，防 TURN 被滥用穿内网
no-loopback-peers
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

fingerprint
lt-cred-mech

# 日志
log-file=/var/log/turnserver.log
simple-log
